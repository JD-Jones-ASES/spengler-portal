<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Space Grotesk',Segoe UI,sans-serif">
  <rect width="1200" height="630" fill="#efe9dd"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#d8cdb4" stroke-width="2"/>

  <!-- phase-clock motif (right) -->
  <g transform="translate(905,315)">
    <circle r="190" fill="#f6f1e7" stroke="#d8cdb4" stroke-width="2"/>
    <!-- four seasonal quadrants, culture-keyed hues -->
    <path d="M0 0 L0 -190 A190 190 0 0 1 190 0 Z" fill="#c8a44d" opacity="0.55"/>
    <path d="M0 0 L190 0 A190 190 0 0 1 0 190 Z" fill="#4d7c6f" opacity="0.5"/>
    <path d="M0 0 L0 190 A190 190 0 0 1 -190 0 Z" fill="#3a5a8c" opacity="0.5"/>
    <path d="M0 0 L-190 0 A190 190 0 0 1 0 -190 Z" fill="#a8895a" opacity="0.45"/>
    <!-- civilization ring (dashed) -->
    <circle r="190" fill="none" stroke="#26406b" stroke-width="3" stroke-dasharray="10 8"/>
    <line x1="0" y1="-190" x2="0" y2="190" stroke="#1f1b14" stroke-width="1.5" opacity="0.4"/>
    <line x1="-190" y1="0" x2="190" y2="0" stroke="#1f1b14" stroke-width="1.5" opacity="0.4"/>
    <circle r="6" fill="#1f1b14"/>
  </g>

  <!-- title block (left) -->
  <text x="80" y="232" font-size="34" letter-spacing="6" fill="#544c3c" font-weight="700">A READING ROOM FOR OSWALD SPENGLER</text>
  <text x="76" y="330" font-size="92" fill="#1f1b14" font-weight="700">The Spengler</text>
  <text x="76" y="424" font-size="92" fill="#1f1b14" font-weight="700">Portal</text>
  <text x="80" y="492" font-size="30" fill="#544c3c" font-family="'Source Serif 4',Georgia,serif" font-style="italic">The Decline of the West &amp; Man and Technics — annotated.</text>

  <!-- culture legend dots -->
  <g transform="translate(80,540)">
    <circle cx="0" cy="0" r="9" fill="#c8a44d"/>
    <circle cx="34" cy="0" r="9" fill="#4d7c6f"/>
    <circle cx="68" cy="0" r="9" fill="#3a5a8c"/>
    <circle cx="102" cy="0" r="9" fill="#a8895a"/>
    <text x="128" y="5" font-size="22" fill="#544c3c" font-family="'IBM Plex Mono',monospace">source-cited · verification is the product</text>
  </g>
</svg>
